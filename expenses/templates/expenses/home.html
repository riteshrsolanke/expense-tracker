{% extends 'expenses/base.html' %}

{% block content %}

<h3 class="mb-4">Dashboard</h3>

<div class="row mb-4">

<div class="col-md-4">
<div class="card p-3">
<h6>Total Expenses</h6>
<h3>₹{{ total }}</h3>
</div>
</div>

</div>


<div class="card p-4">

<form method="get" class="row g-3">

<div class="col-md-4">
<input type="month" name="month" class="form-control">
</div>

<div class="col-md-2">
<button class="btn btn-primary">Filter</button>
</div>

</form>

<hr>

<table class="table table-hover">

<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>Reason</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for e in expenses %}

<tr>
<td>{{ e.date }}</td>
<td>₹{{ e.amount }}</td>
<td>{{ e.reason }}</td>

<td>
<a href="{% url 'delete_expense' e.id %}" class="btn btn-sm btn-danger">
Delete
</a>
</td>

</tr>

{% empty %}

<tr>
<td colspan="4">No expenses yet</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
